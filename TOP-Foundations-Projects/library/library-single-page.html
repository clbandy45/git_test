<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Library</title>
    <style>
        #cards-container {
            width: 100%;
            display: flex;
            flex-wrap: wrap;
            border: 2px solid limegreen;
        }

        .body {
            display: flex;
        }

        .book-card {
            border: 2px solid black;
            border-radius: 10px;
            width: 16rem;
            padding-left: 0.5rem;
            padding-right: 0.5rem;
            padding-bottom: 0.25rem;
            margin: 1px;
        }

        .form-div {
            margin-left: 1rem;
        }

        fieldset {
            display: flex;
        }

        input {
            padding-left: 0.25rem;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        h3 {
            height: 2rem;
        }
    </style>
</head>
<body>
    <h1>My Library</h1>
    <form class="form" name="book-form">
        <fieldset>
            <legend>Add a Book!</legend>
            <div class="form-div">
                <label for="ftitle">Title</label>
                <input type="text" id="ftitle" name="ftitle" placeholder="The Hobbit">
            </div>
            <div class="form-div">
                <label for="fauthor">Author</label>
                <input type="text" id="fauthor" name="fauthor" placeholder="JRR Tolkien">
            </div>
            <div class="form-div">
                <label for="fpages">Pages</label>
                <input type="text" id="fpages" name="fpages" placeholder="297">
            </div>
            <div class="form-div">
                <label for="fstatus">Read Status</label>
                <select name="fstatus" id="fstatus">
                    <option value="Not Read">Not Read</option>
                    <option value="In Progress">In Progress</option>
                    <option value="Read">Read</option>
                </select>
            </div>
            <div class="form-div">
            <button type="button" id="submit-button">Submit</button>
            </div>
        </fieldset>
    </form>
    <div>
        <ul id="error-box"></ul>
    </div>
    <div class="body">
    <div id="cards-container">
        <div class="book-card example-remove example" style="display:">
            <h3 class="example example-remove" style="display:">Add a book!</h3>
            <p class="example example-remove" style="display:">Author</p>
            <p class="example example-remove" style="display:">Pages</p>
            <p class="example example-remove" style="display:">Read Status</p>
            <button class="example example-remove status-btn" style="display:">Change Status</button>
            <button class="example example-remove remove-btn" style="display:">Remove</button>
        </div>
    </div>
    </div>

<script>
    const myLibrary = []; //initiate library

    //GATHER ELEMENTS
    const getTitle = document.getElementById("ftitle"); //form title
    const getAuthor = document.getElementById("fauthor"); //form author
    const getPages = document.getElementById("fpages"); //form pages
    const getStatus = document.getElementById("fstatus"); //form status
    const submitButton = document.getElementById("submit-button"); //submit button
    const errorBox = document.getElementById("error-box"); //error box
    const cardContainer = document.getElementById("cards-container"); //cards container for adding array items into

    //BOOK CONSTRUCTOR
    class Book{
        constructor(title, author, pages, status){
            this.title = title;
            this.author = author;
            this.pages = pages;
            this.status = status;
            this.id = crypto.randomUUID();
        }
    }

    //METHODS
    const methods = {

        addBook: function(title, author, pages, status) {
            const newBook = new Book(title, author, pages, status);
            myLibrary.unshift(newBook);
        },

        showExample: function(){
            const examples = document.querySelectorAll(".example");

            for (i = 0; i < examples.length; i++) {
                const hideMe = examples[i];
                hideMe.style.display = "";
            }
        },

        removeExample: function(){
            const examples = document.querySelectorAll(".example");

            for (i = 0; i < examples.length; i++) {
                const hideMe = examples[i];
                hideMe.style.display = "none";
            }
        },

        addRecent: function(){
            myLibrary.forEach((book, index) => {
                if (index === 0) {
                    cardContainer.insertAdjacentHTML(
                        "afterbegin",
                        `<div class="book-card ${book.id}">
                        <h3 class="${book.id}">${book.title}</h3>
                        <p class="${book.id}">${book.author}</p>
                        <p class="${book.id}">${book.pages}</p>
                        <p class="${book.id}">${book.status}</p>
                        <button class="status-btn ${book.id}">Change Status</button>
                        <button class="remove-btn ${book.id}">Remove</button>
                        </div>`
                    );
                }
            });
        }
    }

    //WHEN SUBMIT A NEW BOOK
    submitButton.addEventListener("click", () => {

        //gather the input values
        let inputTitle = getTitle.value;
        let inputAuthor = getAuthor.value;
        let inputPages = getPages.value;
        let inputStatus = getStatus.value;

        errorBox.innerHTML = "";

        function errorCheck() { //if any are blank display an error message in the error box
            errorBox.innerHTML = "";
            if (inputTitle === "") {errorBox.insertAdjacentHTML("beforeend", "<li>Input a Title!</li>");}
            if (inputAuthor === "") {errorBox.insertAdjacentHTML("beforeend", "<li>Input an Author!</li>");}
            if (inputPages === "") {errorBox.insertAdjacentHTML("beforeend", "<li>Input the pages!</li>");}
        }

        errorCheck();

        if (errorBox.innerHTML === "") { //if nothing in error box, load cards and reset inputs
            methods.removeExample();
            methods.addBook(inputTitle, inputAuthor, inputPages, inputStatus);
            getTitle.value = "";
            getAuthor.value = "";
            getPages.value = "";
            getStatus.value = "Not Read";
            methods.addRecent();
        }
    });

    //EVENT LISTENER
    cardContainer.addEventListener("click", function(event){
        const eventClicked = event.target.classList;

        if (eventClicked[0] === 'status-btn'){
            const statusIdToUpdate = eventClicked[1];
            const arrayOfElements = document.getElementsByClassName(statusIdToUpdate); //array of elements with that id
            const statusToUpdate = arrayOfElements[4];

            //cycle through read status options
            myLibrary.find((x) => { 
                if (x.id === statusIdToUpdate){
                    if (x.status === "Not Read"){ 
                        x.status = "In Progress";
                        statusToUpdate.innerHTML = x.status;
                    } else if (x.status === "In Progress"){
                        x.status = "Read";
                        statusToUpdate.innerHTML = x.status;
                    } else if (x.status === "Read"){
                        x.status = "Not Read";
                        statusToUpdate.innerHTML = x.status;
                    }
                }
            });
        }

        if (eventClicked[0] === 'remove-btn'){
            const statusIdToRemove = eventClicked[1];
            const cardToRemove = document.getElementsByClassName(statusIdToRemove);
            const indexToRemove = myLibrary.findIndex(x => x.id === statusIdToRemove); //find id in library array

            myLibrary.splice(indexToRemove, 1); //remove object from array

            while (cardToRemove.length > 0) {
                cardToRemove[0].parentNode.removeChild(cardToRemove[0]); //remove each element with id from DOM
            }
        }

        if (myLibrary.length === 0) {
            methods.showExample();
        }
    });

    // methods.removeExample();
    // methods.addBook("The Hobbit","JRR Tolkien", "297","Read");
    // methods.addRecent();
    // methods.addBook("The Lord of the Rings: The Fellowship of the Ring","JRR Tolkien", "500","Read");
    // methods.addRecent();
    // methods.addBook("The Lord of the Rings: The Two Towers","JRR Tolkien", "500","Read");
    // methods.addRecent();
    // methods.addBook("The Lord of the Rings: The Return of the King","JRR Tolkien", "297","Read");
    // methods.addRecent();
    // console.log(myLibrary);


</script>
</body>
</html>
